# Optional Actions-based deploy for the docs/ site.
# Primary publish path: GitHub Pages legacy source = main branch /docs
# (Settings → Pages → Deploy from a branch → /docs).
# Use this workflow only if you switch Pages build type to "GitHub Actions".
name: Deploy GitHub Pages
on:
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
